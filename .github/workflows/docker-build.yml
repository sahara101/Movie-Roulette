name: Docker Build
on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.arm'
      - '.github/workflows/docker-build.yml'
      - 'utils/version.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'VERSION\s*=\s*[\"\'](.*?)[\"\']', open('utils/version.py').read()).group(1))")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install latest rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sahara101
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            sahara101/movie-roulette:latest-amd64
            sahara101/movie-roulette:${{ steps.version.outputs.version }}-amd64
            ghcr.io/sahara101/movie-roulette:latest-amd64
            ghcr.io/sahara101/movie-roulette:${{ steps.version.outputs.version }}-amd64

      - name: Build and push ARM
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.arm
          platforms: linux/arm64,linux/arm/v7
          push: true
          tags: |
            sahara101/movie-roulette:arm-latest
            sahara101/movie-roulette:arm-${{ steps.version.outputs.version }}
            sahara101/movie-roulette:latest-arm
            sahara101/movie-roulette:${{ steps.version.outputs.version }}-arm
            ghcr.io/sahara101/movie-roulette:arm-latest
            ghcr.io/sahara101/movie-roulette:arm-${{ steps.version.outputs.version }}
            ghcr.io/sahara101/movie-roulette:latest-arm
            ghcr.io/sahara101/movie-roulette:${{ steps.version.outputs.version }}-arm
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Create and push multi-arch manifests
        run: |
          for REPO in "sahara101/movie-roulette" "ghcr.io/sahara101/movie-roulette"; do
            docker buildx imagetools create -t ${REPO}:latest \
              ${REPO}:latest-amd64 \
              ${REPO}:latest-arm
            docker buildx imagetools create -t ${REPO}:${{ steps.version.outputs.version }} \
              ${REPO}:${{ steps.version.outputs.version }}-amd64 \
              ${REPO}:${{ steps.version.outputs.version }}-arm
          done

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
